name: 🚀 FastAPI Production CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: fastapi-app

jobs:
  test:
    name: 🧪 Test & Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black isort bandit

      - name: 🔍 Lint & Format
        run: |
          ruff check .
          black --check .
          isort . --check-only

      - name: 🔒 Bandit Security Scan
        run: bandit -r app -l

      - name: 🧪 Run Tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: |
          pytest -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: 📊 Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: 🏗️ Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fastapi-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verify Container
        run: |
          docker run -d --name fastapi-test -p 8000:8000 fastapi-app:latest
          sleep 10
          curl -f http://localhost:8000/docs || exit 1
          docker stop fastapi-test && docker rm fastapi-test

  security:
    name: 🔐 Trivy Security Scan
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image for Scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fastapi-app:latest

      - name: 🔍 Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-app:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  push:
    name: 📤 Push to Docker Hub
    needs: [security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fastapi:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/fastapi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: 📧 Email Notification
    needs: [test, build, security, push]
    if: always()          # همیشه اجرا شود (موفق یا شکست)
    runs-on: ubuntu-latest

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: zandinezhadabolfazl@gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: |
            ${{ contains(needs.*.result, 'failure') && '❌' || '✅' }} FastAPI CI/CD - ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: FastAPI CI/CD <${{ secrets.EMAIL_USERNAME }}>
          body: |
            سلام،

            اجرای Pipeline به پایان رسید.

            وضعیت: ${{ contains(needs.*.result, 'failure') && '❌ شکست خورد' || '✅ با موفقیت انجام شد' }}

            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Actor      : ${{ github.actor }}
            Run URL    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            تاریخ: ${{ github.event.head_commit.timestamp }}

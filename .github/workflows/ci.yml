
name: 🚀 FastAPI CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Test & Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11"]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black isort bandit

      - name: 🔍 Ruff Lint
        run: ruff check .

      - name: 🎨 Black Format Check
        run: black --check .

      - name: 📚 Import Order Check
        run: isort . --check-only

      - name: 🔒 Security Scan
        run: bandit -r app -ll

      - name: 🧪 Run Tests
        run: |
          pytest \
          --cov=app \
          --cov-report=term-missing \
          --cov-report=xml

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Verify Application Import
        run: |
          python -c "import main; print('Application imported successfully.')"

      - name: 📦 Verify Project Compiles
        run: |
          python -m compileall .

  notify:
    name: 📧 Email Notification
    runs-on: ubuntu-latest

    needs:
      - test
      - build

    if: failure()

    steps:
      - name: 📧 Send Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "❌ FastAPI CI Failed - ${{ github.repository }}"

          to: ${{ secrets.EMAIL_TO }}

          from: ${{ secrets.EMAIL_USERNAME }}

          body: |
            سلام،

            اجرای Pipeline پروژه با خطا مواجه شد.

            =======================================
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.actor }}
            Workflow   : ${{ github.workflow }}
            Run Number : ${{ github.run_number }}
            =======================================

            مشاهده لاگ:

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            GitHub Actions


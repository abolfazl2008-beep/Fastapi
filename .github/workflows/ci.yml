name: CI/CD FastAPI - Test, Lint & Notify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: 🔍 Lint code (Ruff)
        run: ruff check .

      - name: 🧪 Run tests (Pytest)
        run: pytest -q

  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Import sanity check
        run: |
          python -c "import main; print('✅ App imports successfully')"

  notify:
    name: 📧 Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build]
    if: failure()

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ CI Failed - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: "GitHub Actions <no-reply@github.com>"
          body: |
            CI Pipeline Failed ❌

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            Check details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
